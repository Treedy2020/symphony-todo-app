<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #eef2f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        background: #ffffff;
        border: 1px solid #d9e0ea;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.75rem;
        font-weight: 700;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-bottom: 20px;
      }

      input {
        min-width: 0;
        border: 1px solid #b8c2d2;
        border-radius: 6px;
        font: inherit;
        padding: 10px 12px;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        outline: none;
      }

      button {
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 10px 14px;
      }

      button[type="submit"] {
        background: #2563eb;
        color: #ffffff;
      }

      button[type="submit"]:hover {
        background: #1d4ed8;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 16px;
      }

      .filter-button {
        background: #e2e8f0;
        color: #334155;
      }

      .filter-button:hover {
        background: #cbd5e1;
      }

      .filter-button.selected {
        background: #2563eb;
        color: #ffffff;
      }

      .delete {
        background: #fee2e2;
        color: #991b1b;
      }

      .delete:hover {
        background: #fecaca;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      li {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        border: 1px solid #e5eaf1;
        border-radius: 8px;
        padding: 12px;
        background: #f8fafc;
      }

      .todo-text {
        overflow-wrap: anywhere;
      }

      .empty,
      .error {
        margin: 0;
        color: #64748b;
      }

      .error {
        color: #b91c1c;
        min-height: 1.5em;
      }

      @media (max-width: 480px) {
        body {
          padding: 14px;
        }

        main {
          padding: 20px;
        }

        form,
        li {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Todos</h1>
      <form id="todo-form">
        <input id="todo-input" name="text" type="text" placeholder="Add a todo" autocomplete="off" required>
        <button type="submit">Add</button>
      </form>
      <p id="error" class="error" aria-live="polite"></p>
      <div class="filters" aria-label="Todo filters">
        <button class="filter-button selected" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="filter-button" type="button" data-filter="active" aria-pressed="false">Active</button>
        <button class="filter-button" type="button" data-filter="done" aria-pressed="false">Done</button>
      </div>
      <ul id="todo-list" aria-label="Todo list"></ul>
    </main>

    <script>
      const form = document.querySelector('#todo-form');
      const input = document.querySelector('#todo-input');
      const list = document.querySelector('#todo-list');
      const error = document.querySelector('#error');
      const filterButtons = document.querySelectorAll('.filter-button');
      let todos = [];
      let currentFilter = 'all';

      function setError(message) {
        error.textContent = message;
      }

      function getVisibleTodos() {
        if (currentFilter === 'active') {
          return todos.filter((todo) => todo.done === false);
        }

        if (currentFilter === 'done') {
          return todos.filter((todo) => todo.done === true);
        }

        return todos;
      }

      function renderFilters() {
        filterButtons.forEach((button) => {
          const selected = button.dataset.filter === currentFilter;
          button.classList.toggle('selected', selected);
          button.setAttribute('aria-pressed', String(selected));
        });
      }

      function renderTodos() {
        const visibleTodos = getVisibleTodos();
        list.innerHTML = '';
        renderFilters();

        if (visibleTodos.length === 0) {
          const empty = document.createElement('li');
          empty.className = 'empty';
          empty.textContent = 'No todos here.';
          list.appendChild(empty);
          return;
        }

        visibleTodos.forEach((todo) => {
          const item = document.createElement('li');

          const text = document.createElement('span');
          text.className = 'todo-text';
          text.textContent = todo.text;

          const button = document.createElement('button');
          button.className = 'delete';
          button.type = 'button';
          button.textContent = 'Delete';
          button.addEventListener('click', () => deleteTodo(todo.id));

          item.append(text, button);
          list.appendChild(item);
        });
      }

      async function loadTodos() {
        const response = await fetch('/todos');

        if (!response.ok) {
          throw new Error('Could not load todos');
        }

        const data = await response.json();
        todos = data.todos;
        renderTodos();
      }

      async function addTodo(text) {
        const response = await fetch('/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || 'Could not add todo');
        }
      }

      async function deleteTodo(id) {
        const response = await fetch(`/todos/${id}`, { method: 'DELETE' });

        if (!response.ok) {
          throw new Error('Could not delete todo');
        }

        await loadTodos();
      }

      filterButtons.forEach((button) => {
        button.addEventListener('click', () => {
          currentFilter = button.dataset.filter;
          renderTodos();
        });
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setError('');

        const text = input.value.trim();
        if (!text) {
          return;
        }

        try {
          await addTodo(text);
          input.value = '';
          input.focus();
          await loadTodos();
        } catch (err) {
          setError(err.message);
        }
      });

      loadTodos().catch((err) => setError(err.message));
    </script>
  </body>
</html>
